<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" role="img" aria-labelledby="logo-icon-themeable-title">
  <title id="logo-icon-themeable-title">TechSynergy</title>
  <desc>Network pyramid logo that inherits color from parent element</desc>
  <!-- Connection lines using currentColor with reduced opacity -->
  <line x1="16" y1="6" x2="9" y2="14" stroke="currentColor" stroke-width="1.8" stroke-opacity="0.45"/>
  <line x1="16" y1="6" x2="23" y2="14" stroke="currentColor" stroke-width="1.8" stroke-opacity="0.45"/>
  <line x1="9" y1="18" x2="3" y2="26" stroke="currentColor" stroke-width="1.8" stroke-opacity="0.35"/>
  <line x1="9" y1="18" x2="16" y2="26" stroke="currentColor" stroke-width="1.8" stroke-opacity="0.45"/>
  <line x1="23" y1="18" x2="16" y2="26" stroke="currentColor" stroke-width="1.8" stroke-opacity="0.45"/>
  <line x1="23" y1="18" x2="29" y2="26" stroke="currentColor" stroke-width="1.8" stroke-opacity="0.35"/>
  <!-- Nodes using currentColor -->
  <circle cx="16" cy="3.5" r="3.5" fill="currentColor" fill-opacity="0.9"/>
  <circle cx="9" cy="15.5" r="3.5" fill="currentColor" fill-opacity="0.9"/>
  <circle cx="23" cy="15.5" r="3.5" fill="currentColor" fill-opacity="0.9"/>
  <circle cx="3" cy="28" r="3" fill="currentColor" fill-opacity="0.6"/>
  <circle cx="16" cy="28" r="3.5" fill="currentColor" fill-opacity="0.9"/>
  <circle cx="29" cy="28" r="3" fill="currentColor" fill-opacity="0.6"/>
</svg>
