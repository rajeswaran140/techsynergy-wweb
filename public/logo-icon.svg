<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" role="img" aria-labelledby="logo-icon-title">
  <title id="logo-icon-title">TechSynergy</title>
  <desc>Network pyramid logo representing connected technology nodes</desc>
  <!-- Connection lines -->
  <line x1="16" y1="6" x2="9" y2="14" stroke="#3b82f6" stroke-width="1.8" stroke-opacity="0.45"/>
  <line x1="16" y1="6" x2="23" y2="14" stroke="#3b82f6" stroke-width="1.8" stroke-opacity="0.45"/>
  <line x1="9" y1="18" x2="3" y2="26" stroke="#60a5fa" stroke-width="1.8" stroke-opacity="0.35"/>
  <line x1="9" y1="18" x2="16" y2="26" stroke="#3b82f6" stroke-width="1.8" stroke-opacity="0.45"/>
  <line x1="23" y1="18" x2="16" y2="26" stroke="#3b82f6" stroke-width="1.8" stroke-opacity="0.45"/>
  <line x1="23" y1="18" x2="29" y2="26" stroke="#60a5fa" stroke-width="1.8" stroke-opacity="0.35"/>
  <!-- Top node -->
  <circle cx="16" cy="3.5" r="3.5" fill="#3b82f6"/>
  <!-- Middle row -->
  <circle cx="9" cy="15.5" r="3.5" fill="#3b82f6"/>
  <circle cx="23" cy="15.5" r="3.5" fill="#3b82f6"/>
  <!-- Bottom row -->
  <circle cx="3" cy="28" r="3" fill="#60a5fa"/>
  <circle cx="16" cy="28" r="3.5" fill="#3b82f6"/>
  <circle cx="29" cy="28" r="3" fill="#60a5fa"/>
</svg>
