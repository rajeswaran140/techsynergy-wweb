<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#071237;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1160f7;stop-opacity:1" />
    </linearGradient>

    <!-- Subtle pattern overlay -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Decorative elements -->
  <circle cx="100" cy="100" r="120" fill="rgba(255,255,255,0.03)"/>
  <circle cx="1100" cy="530" r="150" fill="rgba(255,255,255,0.03)"/>

  <!-- Logo Icon (Network Pyramid) - Scaled and positioned above company name -->
  <g transform="translate(530, 80) scale(3.5)">
    <!-- Connection lines -->
    <line x1="16" y1="6" x2="9" y2="14" stroke="#60a5fa" stroke-width="1.8" stroke-opacity="0.7"/>
    <line x1="16" y1="6" x2="23" y2="14" stroke="#60a5fa" stroke-width="1.8" stroke-opacity="0.7"/>
    <line x1="9" y1="18" x2="3" y2="26" stroke="#93c5fd" stroke-width="1.8" stroke-opacity="0.5"/>
    <line x1="9" y1="18" x2="16" y2="26" stroke="#60a5fa" stroke-width="1.8" stroke-opacity="0.7"/>
    <line x1="23" y1="18" x2="16" y2="26" stroke="#60a5fa" stroke-width="1.8" stroke-opacity="0.7"/>
    <line x1="23" y1="18" x2="29" y2="26" stroke="#93c5fd" stroke-width="1.8" stroke-opacity="0.5"/>
    <!-- Nodes -->
    <circle cx="16" cy="3.5" r="3.5" fill="#60a5fa"/>
    <circle cx="9" cy="15.5" r="3.5" fill="#60a5fa"/>
    <circle cx="23" cy="15.5" r="3.5" fill="#60a5fa"/>
    <circle cx="3" cy="28" r="3" fill="#93c5fd"/>
    <circle cx="16" cy="28" r="3.5" fill="#60a5fa"/>
    <circle cx="29" cy="28" r="3" fill="#93c5fd"/>
  </g>

  <!-- Content Container -->
  <g transform="translate(600, 345)">
    <!-- Company Name -->
    <text
      x="0"
      y="-80"
      font-family="system-ui, -apple-system, sans-serif"
      font-size="72"
      font-weight="700"
      fill="white"
      text-anchor="middle"
      letter-spacing="2">
      TechSynergy
    </text>

    <!-- Main Headline -->
    <text
      x="0"
      y="0"
      font-family="system-ui, -apple-system, sans-serif"
      font-size="48"
      font-weight="600"
      fill="white"
      text-anchor="middle"
      opacity="0.95">
      Canadian Software Development
    </text>

    <!-- Subheadline -->
    <text
      x="0"
      y="50"
      font-family="system-ui, -apple-system, sans-serif"
      font-size="28"
      font-weight="400"
      fill="white"
      text-anchor="middle"
      opacity="0.8">
      Privacy-First SaaS Products
    </text>

    <!-- Divider Line -->
    <line
      x1="-200"
      y1="90"
      x2="200"
      y2="90"
      stroke="rgba(255,255,255,0.3)"
      stroke-width="2"/>

    <!-- Bottom tagline -->
    <text
      x="0"
      y="135"
      font-family="system-ui, -apple-system, sans-serif"
      font-size="22"
      font-weight="500"
      fill="white"
      text-anchor="middle"
      opacity="0.7"
      letter-spacing="4">
      PIPEDA COMPLIANT • CANADIAN HOSTED
    </text>
  </g>

  <!-- Bottom accent -->
  <rect x="0" y="615" width="1200" height="15" fill="rgba(17, 96, 247, 0.5)"/>
</svg>
